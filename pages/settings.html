<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro - Settings</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.0.0/remixicon.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="brand">
             FinTrack Pro
            <span>Enterprise Finance</span>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="settings.html">Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div class="top-header">
            <span class="user-name" id="userDisplay">Guest</span>
            <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
        </div>

        <div class="page-title">
            <h1>Settings</h1>
            <p>Manage your account profile and app formatting.</p>
        </div>

        <div class="widget settings-card">
            <div class="widget-title">Profile Details</div>
            
            <form id="settingsForm">
                <div class="settings-form-row">
                    <div class="settings-group">
                        <label for="settingsName">Full Name</label>
                        <input type="text" id="settingsName" required>
                    </div>
                    
                    <div class="settings-group">
                        <label for="settingsCurrency">Primary Currency</label>
                        <select id="settingsCurrency">
                            <option value="$">USD ($)</option>
                            <option value="₹">INR (₹)</option>
                            <option value="€">EUR (€)</option>
                            <option value="£">GBP (£)</option>
                        </select>
                    </div>
                </div>
                
                <div class="dark-mode-toggle">
                    <label for="darkModeToggle" style="margin-bottom: 0;">Dark Mode</label>
                    <div class="toggle-switch" id="darkModeToggle"></div>
                </div>
                
                <button type="submit" class="save-changes-btn">Save Changes</button>
            </form>
        </div>

    </div>

    <script src="/js/settings.js"></script>
</body>
</html>
